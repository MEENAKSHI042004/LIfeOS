<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>LifeOS AI</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        body {
            background-color: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
        }

        .sidebar {
            height: 100vh;
            background: #111827;
            padding: 20px;
        }

        .sidebar h2 {
            color: #38bdf8;
            margin-bottom: 30px;
        }

        .sidebar a {
            display: block;
            color: #cbd5e1;
            text-decoration: none;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .sidebar a:hover {
            color: white;
        }

        .card-dark {
            background: #1e293b;
            border: none;
            border-radius: 15px;
            padding: 20px;
        }

        .metric-number {
            font-size: 32px;
            font-weight: bold;
        }

        .ai-box {
            background: linear-gradient(
                135deg,
                #2563eb,
                #7c3aed
            );

            border-radius: 20px;
            padding: 20px;
        }

    </style>

</head>

<body>

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->

        <div class="col-md-2 sidebar">

            <h2>LifeOS AI</h2>

            <a href="#">Dashboard</a>
            <a href="#">Finance</a>
            <a href="#">Habits</a>
            <a href="#">Goals</a>
            <a href="#">AI Insights</a>

        </div>

        <!-- MAIN CONTENT -->

        <div class="col-md-10 p-4">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</div>

</body>
</html>
